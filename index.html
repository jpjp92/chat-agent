<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Chat Agent with Gemini</title>

  <!-- Theme Initialization Script (Prevents FOUC) -->
  <script>
    try {
      if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark');
      } else {
        document.documentElement.classList.remove('dark');
      }
    } catch (_) { }
  </script>

  <!-- Standard Resource Connection -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <!-- Standard Fonts -->
  <link rel="preload" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" as="style"
    onload="this.onload=null;this.rel='stylesheet'">
  <noscript>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap">
  </noscript>

  <!-- font-display: swap override for FontAwesome woff2 (prevents 40ms FCP loss) -->
  <style>
    @font-face {
      font-family: "Font Awesome 6 Free";
      font-display: swap;
      src: url("https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/webfonts/fa-solid-900.woff2") format("woff2");
      font-weight: 900;
      font-style: normal;
    }

    @font-face {
      font-family: "Font Awesome 6 Free";
      font-display: swap;
      src: url("https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/webfonts/fa-regular-400.woff2") format("woff2");
      font-weight: 400;
      font-style: normal;
    }
  </style>

  <!-- FontAwesome: base + solid + regular only (replaces all.min.css, saves ~12 KiB) -->
  <link rel="preload" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/fontawesome.min.css"
    as="style" onload="this.onload=null;this.rel='stylesheet'" crossorigin="anonymous">
  <noscript>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/fontawesome.min.css"
      crossorigin="anonymous">
  </noscript>

  <link rel="preload" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/solid.min.css" as="style"
    onload="this.onload=null;this.rel='stylesheet'" crossorigin="anonymous">
  <noscript>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/solid.min.css"
      crossorigin="anonymous">
  </noscript>

  <link rel="preload" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/regular.min.css" as="style"
    onload="this.onload=null;this.rel='stylesheet'" crossorigin="anonymous">
  <noscript>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/regular.min.css"
      crossorigin="anonymous">
  </noscript>

  <link rel="preload" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css" as="style"
    onload="this.onload=null;this.rel='stylesheet'" crossorigin="anonymous">
  <noscript>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css" crossorigin="anonymous">
  </noscript>

  <script>
    window.process = { env: {} };
  </script>
</head>

<body class="bg-white dark:bg-[#131314] text-slate-900 dark:text-[#e3e3e3] antialiased">
  <div id="root"></div>
  <!-- Standard Vite entry point -->
  <script type="module" src="/index.tsx"></script>
</body>

</html>
